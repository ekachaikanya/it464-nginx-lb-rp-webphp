# ═══════════════════════════════════════════════════════════
# NGINX REVERSE PROXY — port 8080
# รับ request จาก client ส่งต่อไปยัง app1
# พร้อมเพิ่ม headers และจัดการ logging
# ═══════════════════════════════════════════════════════════

server {
    listen      80;
    server_name localhost;

    access_log /var/log/nginx/rp-access.log;
    error_log  /var/log/nginx/rp-error.log;

    # ── Main route → proxy ไปยัง app1 ──────────────────────
    location / {
        # ส่งไปยัง app1 เสมอ (reverse proxy แบบ 1:1)
        proxy_pass         http://app1:80;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";

        # ── Headers ที่ reverse proxy เพิ่มให้ backend ──────
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Proxy-By        nginx-rp;

        # ── Timeout ─────────────────────────────────────────
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # ── Response header (ให้ client เห็นว่าผ่าน RP) ────
        add_header X-Served-Via "nginx-rp" always;
    }

    # ── Nginx status ─────────────────────────────────────────
    location /rp-status {
        stub_status on;
        access_log  off;
    }

    # ── Error handling ───────────────────────────────────────
    error_page 502 503 @app_down;
    location @app_down {
        return 503 '{"error":"app1 unavailable","status":503}';
        add_header Content-Type application/json;
    }
}
