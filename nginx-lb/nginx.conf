# ═══════════════════════════════════════════════════════════
# NGINX LOAD BALANCER — port 80
# กระจาย traffic ไปยัง app1, app2, app3 (Nginx + PHP-FPM)
# ═══════════════════════════════════════════════════════════

upstream backend {
    # Algorithm: least_conn
    # ส่งไปยัง server ที่มี active connections น้อยที่สุด
    # เปลี่ยนเป็น ip_hash; สำหรับ session sticky
    # ลบออกเพื่อใช้ round_robin (default)
    least_conn;

    server app1:80;   # Nginx web server ใน app1 container
    server app2:80;   # Nginx web server ใน app2 container
    server app3:80;   # Nginx web server ใน app3 container

    # Connection pool — ลด TCP handshake overhead
    keepalive 32;
}

server {
    listen      80;
    server_name localhost;

    access_log /var/log/nginx/lb-access.log;
    error_log  /var/log/nginx/lb-error.log;

    # ── ส่งทุก request ไปยัง upstream ──────────────────────
    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-By    nginx-lb;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── Nginx status (monitoring) ────────────────────────────
    location /lb-status {
        stub_status on;
        access_log  off;
    }

    # ── Error page ───────────────────────────────────────────
    error_page 502 503 504 @backend_down;
    location @backend_down {
        return 503 '{"error":"All backend servers unavailable","status":503}';
        add_header Content-Type application/json;
    }
}
