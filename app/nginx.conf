# ═══════════════════════════════════════════════════════════
# NGINX WEB SERVER — inside app container
# รับ HTTP request → static files โดยตรง
#                 → .php files ผ่าน FastCGI → php-fpm
# ═══════════════════════════════════════════════════════════

server {
    listen      80;
    server_name localhost;
    root        /var/www/html;
    index       index.php index.html;

    access_log /var/log/nginx/app-access.log;
    error_log  /var/log/nginx/app-error.log;

    # ── Try files, fallback to index.php ────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP files → FastCGI → php-fpm ───────────────────────
    location ~ \.php$ {
        # php-fpm listens on 127.0.0.1:9000 (same container)
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # ส่ง environment variable ให้ PHP
        fastcgi_param  SERVER_CONTAINER_NAME $hostname;
    }

    # ── Health check endpoint ────────────────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok","server":"nginx+php-fpm"}';
        add_header Content-Type application/json;
    }

    # ── Deny .htaccess access ────────────────────────────────
    location ~ /\.ht {
        deny all;
    }
}
